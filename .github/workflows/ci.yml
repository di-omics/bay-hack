name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - name: Sim demo must stay green
        run: python -m bayhack.demo
      - name: Tests
        run: pytest -q
      - name: Benchmark claims must stay reproducible
        run: python -m bayhack.benchmark
      - name: Compile all Python modules
        run: python -m compileall -q bayhack tests
