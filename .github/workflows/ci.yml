name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - name: Sim demo must stay green
        run: python -m bayhack.demo
      - name: TEM-1 Track A demo must stay green
        run: python -m bayhack.tem1_demo --receipt run_artifacts/tem1-trust.json
      - name: TEM-1 on-site workflow must stay available
        run: python -m bayhack.tem1_cli --help
      - name: Unsafe plan must be refused before motion
        run: python -m bayhack.safety --output run_artifacts/refusal.json
      - name: Measurement adapter CLI must stay available
        run: python -m bayhack.measurements --help
      - name: Physical verification adapters must stay available
        run: python -m bayhack.verification --help
      - name: Zero-motion readiness audit must pass
        run: python -m bayhack.preflight --output run_artifacts/preflight.json
      - name: Tests
        run: pytest -q
      - name: Benchmark claims must stay reproducible
        run: python -m bayhack.benchmark
      - name: Compile all Python modules
        run: python -m compileall -q bayhack tests
